      readOnlyHint: true
      destructiveHint: false
      idempotentHint: true
      openWorldHint: false
  - name: listStacks
    description: List all available stacks
    annotations:
      title: List Stacks
      readOnlyHint: true
      destructiveHint: false
      idempotentHint: true
      openWorldHint: false
  - name: getStackFile
    description: Get the compose file for a specific stack ID. In safe_mode, secret-like environment values and secrets blocks are redacted unless allow_unredacted_stack_content is enabled.
    arguments:
      - name: id
        type: number
        desc: The ID of the stack to get the compose file for
    annotations:
      title: Get Stack File
      readOnlyHint: true
      destructiveHint: false
      idempotentHint: true
      openWorldHint: false
  - name: createStack
    description: Create a new stack
    arguments:
      - name: name
        type: string
        desc: Name of the stack. Stack name must only consist of lowercase alpha characters, numbers, hyphens, or underscores as well as start with a lowercase character or number
      - name: file
        type: string
        desc: |-
          Content of the stack file. The file must be a valid docker-compose.yml file. example: services:
           web:
             image:nginx
      - name: environmentGroupIds
        type: array
        desc: 'The IDs of the environment groups that the stack belongs to. Must include at least one environment group ID. Example: [1, 2, 3]'
        items:
          type: number
    annotations:
      title: Create Stack
      readOnlyHint: false
      destructiveHint: false
      idempotentHint: false
      openWorldHint: false
  - name: updateStack
    description: Update an existing stack
    arguments:
      - name: id
        type: number
        desc: The ID of the stack to update
      - name: file
        type: string
        desc: |-
          Content of the stack file. The file must be a valid docker-compose.yml file. example: version: 3
           services:
             web:
               image:nginx
      - name: environmentGroupIds
        type: array
        desc: 'The IDs of the environment groups that the stack belongs to. Must include at least one environment group ID. Example: [1, 2, 3]'
        items:
          type: number
    annotations:
      title: Update Stack
      readOnlyHint: false
      destructiveHint: false
      idempotentHint: true
      openWorldHint: false
  - name: listLocalStacks
    description: List all local (non-edge) stacks deployed on Portainer environments. Returns stack ID, name, status, type, environment ID, creation date, and environment variables for each stack. In safe_mode, secret-like environment variable values are redacted unless allow_unredacted_stack_content is enabled.
    annotations:
      title: List Local Stacks
      readOnlyHint: true
      destructiveHint: false
      idempotentHint: true
      openWorldHint: false
  - name: getLocalStackFile
    description: Get the docker-compose file content for a specific local stack by its ID. In safe_mode, secret-like environment values and secrets blocks are redacted unless allow_unredacted_stack_content is enabled.
    arguments:
      - name: id
        type: number
        desc: The ID of the local stack to get the compose file for
    annotations:
      title: Get Local Stack File
      readOnlyHint: true
      destructiveHint: false
      idempotentHint: true
      openWorldHint: false
  - name: createLocalStack
    description: Create a new local standalone Docker Compose stack on a specific environment. Requires the environment ID, a stack name, and the compose file content. Optionally accepts environment variables.
    arguments:
      - name: environmentId
        type: number
        desc: The ID of the environment to deploy the stack to
      - name: name
        type: string
        desc: Name of the stack. Stack name must only consist of lowercase alpha characters, numbers, hyphens, or underscores as well as start with a lowercase character or number
      - name: file
        type: string
        desc: |-
          Content of the stack file. The file must be a valid docker-compose.yml file. example: services:
           web:
             image: nginx
      - name: env
        type: array
        desc: 'Optional environment variables for the stack. Each variable must have a ''name'' and ''value'' field. Example: [{"name": "DB_HOST", "value": "localhost"}]'
        optional: true
        items:
          properties:
            name:
              description: The name of the environment variable
              type: string
            value:
              description: The value of the environment variable
              type: string
          type: object
    annotations:
      title: Create Local Stack
      readOnlyHint: false
      destructiveHint: false
      idempotentHint: false
      openWorldHint: false
  - name: updateLocalStack
    description: Update an existing local stack with new compose file content and/or environment variables. Requires the stack ID and environment ID.
    arguments:
      - name: id
        type: number
        desc: The ID of the local stack to update
      - name: environmentId
        type: number
        desc: The ID of the environment where the stack is deployed
      - name: file
        type: string
        desc: |-
          Content of the stack file. The file must be a valid docker-compose.yml file. example: services:
           web:
             image: nginx
      - name: env
        type: array
        desc: 'Optional environment variables for the stack. Each variable must have a ''name'' and ''value'' field. Example: [{"name": "DB_HOST", "value": "localhost"}]'
        optional: true
        items:
          properties:
            name:
              description: The name of the environment variable
              type: string
            value:
              description: The value of the environment variable
              type: string
          type: object
      - name: prune
        type: boolean
        desc: 'If true, services that are no longer in the compose file will be removed. Default: false'
        optional: true
      - name: pullImage
        type: boolean
        desc: 'If true, images will be pulled before deploying. Default: false'
        optional: true
    annotations:
      title: Update Local Stack
      readOnlyHint: false
      destructiveHint: false
      idempotentHint: true
      openWorldHint: false
  - name: startLocalStack
    description: Start a stopped local stack. Brings up all containers defined in the stack's compose file.
    arguments:
      - name: id
        type: number
        desc: The ID of the local stack to start
      - name: environmentId
        type: number
        desc: The ID of the environment where the stack is deployed
    annotations:
      title: Start Local Stack
      readOnlyHint: false
      destructiveHint: false
      idempotentHint: true
      openWorldHint: false
  - name: stopLocalStack
    description: Stop a running local stack. Stops all containers defined in the stack's compose file.
    arguments:
      - name: id
        type: number
        desc: The ID of the local stack to stop
      - name: environmentId
        type: number
        desc: The ID of the environment where the stack is deployed
    annotations:
      title: Stop Local Stack
      readOnlyHint: false
      destructiveHint: false
      idempotentHint: true
      openWorldHint: false
  - name: deleteLocalStack
    description: Delete a local stack permanently. This removes the stack and all its associated containers from the environment.
    arguments:
      - name: id
        type: number
        desc: The ID of the local stack to delete
      - name: environmentId
        type: number
        desc: The ID of the environment where the stack is deployed
    annotations:
