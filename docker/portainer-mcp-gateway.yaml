    arguments:
      - name: id
        type: number
        desc: The ID of the user to update
      - name: role
        type: string
        desc: The role of the user. Can be admin, user or edge_admin
        enum:
          - admin
          - user
          - edge_admin
    annotations:
      title: Update User Role
      readOnlyHint: false
      destructiveHint: false
      idempotentHint: true
      openWorldHint: false
  - name: dockerProxy
    description: Proxy Docker requests to a specific Portainer environment. This tool can be used with any Docker API operation as documented in the Docker Engine API specification (https://docs.docker.com/reference/api/engine/version/v1.48/). In read-only mode, only GET requests are allowed. In safe_mode, requests are additionally restricted to an allowlist unless allow_sensitive_proxy_paths is enabled.
    arguments:
      - name: environmentId
        type: number
        desc: The ID of the environment to proxy Docker requests to
      - name: method
        type: string
        desc: The HTTP method to use to proxy the Docker API operation
        enum:
          - GET
          - POST
          - PUT
          - DELETE
          - HEAD
      - name: dockerAPIPath
        type: string
        desc: 'The route of the Docker API operation to proxy. Must include the leading slash. Example: /containers/json'
      - name: queryParams
        type: array
        desc: 'The query parameters to include in the Docker API operation. Must be an array of key-value pairs. Example: [{key: ''all'', value: ''true''}, {key: ''filter'', value: ''dangling''}]'
        optional: true
        items:
          properties:
            key:
              description: The key of the query parameter
              type: string
            value:
              description: The value of the query parameter
              type: string
          type: object
      - name: headers
        type: array
        desc: 'The headers to include in the Docker API operation. Must be an array of key-value pairs. Example: [{key: ''Content-Type'', value: ''application/json''}]'
        optional: true
        items:
          properties:
            key:
              description: The key of the header
              type: string
            value:
              description: The value of the header
              type: string
          type: object
      - name: body
        type: string
        desc: 'The body of the Docker API operation to proxy. Must be a JSON string. Example: {''Image'': ''nginx:latest'', ''Name'': ''my-container''}'
        optional: true
    annotations:
      title: Docker Proxy
      readOnlyHint: true
      destructiveHint: true
      idempotentHint: true
      openWorldHint: false
  - name: kubernetesProxy
    description: Proxy Kubernetes requests to a specific Portainer environment. This tool can be used with any Kubernetes API operation as documented in the Kubernetes API specification (https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/). In read-only mode, only GET requests are allowed. In safe_mode, secret resource paths are denied unless allow_sensitive_proxy_paths is enabled, and secret-like fields in JSON responses are redacted.
    arguments:
      - name: environmentId
        type: number
        desc: The ID of the environment to proxy Kubernetes requests to
      - name: method
        type: string
        desc: The HTTP method to use to proxy the Kubernetes API operation
        enum:
          - GET
          - POST
          - PUT
          - DELETE
          - HEAD
      - name: kubernetesAPIPath
        type: string
        desc: 'The route of the Kubernetes API operation to proxy. Must include the leading slash. Example: /api/v1/namespaces/default/pods'
      - name: queryParams
        type: array
        desc: 'The query parameters to include in the Kubernetes API operation. Must be an array of key-value pairs. Example: [{key: ''watch'', value: ''true''}, {key: ''fieldSelector'', value: ''metadata.name=my-pod''}]'
        optional: true
        items:
          properties:
            key:
              description: The key of the query parameter
              type: string
            value:
              description: The value of the query parameter
              type: string
          type: object
      - name: headers
        type: array
        desc: 'The headers to include in the Kubernetes API operation. Must be an array of key-value pairs. Example: [{key: ''Content-Type'', value: ''application/json''}]'
        optional: true
        items:
          properties:
            key:
              description: The key of the header
              type: string
            value:
              description: The value of the header
              type: string
          type: object
      - name: body
        type: string
        desc: 'The body of the Kubernetes API operation to proxy. Must be a JSON string. Example: {''apiVersion'': ''v1'', ''kind'': ''Pod'', ''metadata'': {''name'': ''my-pod''}}'
        optional: true
    annotations:
      title: Kubernetes Proxy
      readOnlyHint: true
      destructiveHint: true
      idempotentHint: true
      openWorldHint: false
  - name: getKubernetesResourceStripped
    description: Proxy GET requests to a specific Portainer environment for Kubernetes resources, and automatically strips verbose metadata fields (such as 'managedFields') from the API response to reduce its size. This tool is intended for retrieving Kubernetes resource information where a leaner payload is desired. This tool can be used with any GET Kubernetes API operation as documented in the Kubernetes API specification (https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/). For other methods (POST, PUT, DELETE, HEAD), use the 'kubernetesProxy' tool. In safe_mode, secret resource paths are denied unless allow_sensitive_proxy_paths is enabled, and secret-like fields in JSON responses are redacted.
    arguments:
      - name: environmentId
        type: number
