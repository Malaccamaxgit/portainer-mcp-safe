      title: List Environments
      readOnlyHint: true
      destructiveHint: false
      idempotentHint: true
      openWorldHint: false
  - name: updateEnvironmentTags
    description: Update the tags associated with an environment
    arguments:
      - name: id
        type: number
        desc: The ID of the environment to update
      - name: tagIds
        type: array
        desc: 'The IDs of the tags that are associated with the environment. Must include all the tag IDs that should be associated with the environment - this includes new tags and existing tags. Providing an empty array will remove all tags. Example: [1, 2, 3]'
        items:
          type: number
