      - name: userAccesses
        type: array
        desc: 'The user accesses that are associated with the environment. The ID is the user ID of the user in Portainer. Must include all the access policies for all users that should be associated with the environment. Providing an empty array will remove all user accesses. Example: [{id: 1, access: ''environment_administrator''}, {id: 2, access: ''standard_user''}]'
        items:
          properties:
            access:
              description: The access level of the user
              enum:
                - environment_administrator
                - helpdesk_user
                - standard_user
                - readonly_user
                - operator_user
              type: string
            id:
              description: The ID of the user
              type: number
          type: object
    annotations:
      title: Update Environment User Accesses
      readOnlyHint: false
      destructiveHint: false
      idempotentHint: true
      openWorldHint: false
  - name: updateEnvironmentTeamAccesses
    description: Update the team access policies of an environment
    arguments:
      - name: id
        type: number
        desc: The ID of the environment to update
      - name: teamAccesses
        type: array
        desc: 'The team accesses that are associated with the environment. The ID is the team ID of the team in Portainer. Must include all the access policies for all teams that should be associated with the environment. Providing an empty array will remove all team accesses. Example: [{id: 1, access: ''environment_administrator''}, {id: 2, access: ''standard_user''}]'
        items:
          properties:
            access:
              description: The access level of the team
              enum:
                - environment_administrator
                - helpdesk_user
                - standard_user
                - readonly_user
                - operator_user
              type: string
            id:
              description: The ID of the team
              type: number
          type: object
    annotations:
      title: Update Environment Team Accesses
      readOnlyHint: false
      destructiveHint: false
      idempotentHint: true
      openWorldHint: false
  - name: createEnvironmentGroup
    description: Create a new environment group. Environment groups are the equivalent of Edge Groups in Portainer.
    arguments:
      - name: name
        type: string
        desc: The name of the environment group
      - name: environmentIds
        type: array
        desc: The IDs of the environments to add to the group
        items:
          type: number
    annotations:
      title: Create Environment Group
      readOnlyHint: false
      destructiveHint: false
      idempotentHint: false
      openWorldHint: false
  - name: listEnvironmentGroups
    description: List all available environment groups. Environment groups are the equivalent of Edge Groups in Portainer.
    annotations:
      title: List Environment Groups
      readOnlyHint: true
      destructiveHint: false
      idempotentHint: true
