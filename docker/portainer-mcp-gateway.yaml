name: portainer-mcp-safe
title: Portainer MCP Safe
type: server
image: portainer-mcp-safe:0.7.0-safe.1
longLived: false
description: 'Portainer MCP Safe packaged as a container for Docker MCP Toolkit and MCP Gateway. Uses the local safe fork binary behind an arg-driven entrypoint.

'
allowHosts:
  - host.docker.internal:9443
secrets:
  - name: portainer-mcp.api_token
    env: PORTAINER_API_TOKEN
    example: ptnr_xxxxxxxxxxxxxxxxxxxx
    description: Portainer administrator API token
config:
  - name: portainer-mcp-safe
    description: Portainer MCP Safe server configuration
    type: object
    properties:
      safe_mode:
        type: boolean
        description: Enable redaction and proxy safety controls
        default: true
      business_edition:
        type: boolean
        description: Enable Portainer Business Edition (EE) tools. Leave off for Community Edition.
        default: false
      allow_unredacted_stack_content:
        type: boolean
        description: Allow raw stack env values and compose content
        default: false
      allow_sensitive_proxy_paths:
        type: boolean
        description: Allow sensitive Docker and Kubernetes proxy paths
        default: false
      proxy_allowlist:
        type: string
        description: Extra proxy allowlist entries formatted as METHOD:/path-prefix and separated by commas
        default: ''
      extra_redaction_patterns:
        type: string
        description: Extra regex patterns for redacting secret-like keys, separated by commas
        default: ''
env:
  - name: PORTAINER_TOOLS_PATH
    value: /tmp/portainer-tools.yaml
  - name: PORTAINER_SAFE_MODE
    value: '{{portainer-mcp-safe.safe_mode}}'
  - name: PORTAINER_BUSINESS_EDITION
    value: '{{portainer-mcp-safe.business_edition}}'
  - name: PORTAINER_ALLOW_UNREDACTED_STACK_CONTENT
    value: '{{portainer-mcp-safe.allow_unredacted_stack_content}}'
  - name: PORTAINER_ALLOW_SENSITIVE_PROXY_PATHS
    value: '{{portainer-mcp-safe.allow_sensitive_proxy_paths}}'
  - name: PORTAINER_PROXY_ALLOWLIST
    value: '{{portainer-mcp-safe.proxy_allowlist}}'
  - name: PORTAINER_EXTRA_REDACTION_PATTERNS
    value: '{{portainer-mcp-safe.extra_redaction_patterns}}'
command:
  - --server-url
  - host.docker.internal:9443
  - --disable-version-check
  - 'true'
# AUTO-GENERATED — do not edit by hand.
# Run: make regen-gateway-tools (or: go run ./cmd/regen-gateway-tools)
# Source of truth: internal/tooldef/tools.yaml
# The CI gateway-sync test will fail if this block drifts from source.
tools:
  - name: listAccessGroups
    description: List all available access groups
    annotations:
      title: List Access Groups
      readOnlyHint: true
      destructiveHint: false
      idempotentHint: true
      openWorldHint: false
  - name: createAccessGroup
    description: Create a new access group. Use access groups when you want to define accesses on more than one environment. Otherwise, define the accesses on the environment level.
    arguments:
      - name: name
        type: string
        desc: The name of the access group
      - name: environmentIds
        type: array
        desc: 'The IDs of the environments that are part of the access group. Must include all the environment IDs that are part of the group - this includes new environments and the existing environments that are already associated with the group. Example: [1, 2, 3]'
        optional: true
        items:
          type: number
    annotations:
      title: Create Access Group
      readOnlyHint: false
      destructiveHint: false
      idempotentHint: false
      openWorldHint: false
  - name: updateAccessGroupName
    description: Update the name of an existing access group.
    arguments:
      - name: id
        type: number
        desc: The ID of the access group to update
      - name: name
        type: string
        desc: The name of the access group
    annotations:
      title: Update Access Group Name
      readOnlyHint: false
      destructiveHint: false
      idempotentHint: true
      openWorldHint: false
  - name: updateAccessGroupUserAccesses
    description: Update the user accesses of an existing access group.
    arguments:
      - name: id
        type: number
        desc: The ID of the access group to update
      - name: userAccesses
        type: array
        desc: 'The user accesses that are associated with all the environments in the access group. The ID is the user ID of the user in Portainer. Example: [{id: 1, access: ''environment_administrator''}, {id: 2, access: ''standard_user''}]'
        items:
          properties:
            access:
              description: The access level of the user. Can be environment_administrator, helpdesk_user, standard_user, readonly_user or operator_user
              enum:
                - environment_administrator
                - helpdesk_user
                - standard_user
                - readonly_user
                - operator_user
              type: string
            id:
              description: The ID of the user
              type: number
          type: object
    annotations:
      title: Update Access Group User Accesses
      readOnlyHint: false
      destructiveHint: false
      idempotentHint: true
      openWorldHint: false
  - name: updateAccessGroupTeamAccesses
    description: Update the team accesses of an existing access group.
    arguments:
      - name: id
        type: number
        desc: The ID of the access group to update
      - name: teamAccesses
        type: array
        desc: 'The team accesses that are associated with all the environments in the access group. The ID is the team ID of the team in Portainer. Example: [{id: 1, access: ''environment_administrator''}, {id: 2, access: ''standard_user''}]'
        items:
          properties:
            access:
              description: The access level of the team. Can be environment_administrator, helpdesk_user, standard_user, readonly_user or operator_user
